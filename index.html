<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الخطوط</title>

<style>

body{
font-family:Arial;
direction:rtl;
margin:0;
background:#f4f6f9;
}

header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#1e3c72;
color:white;
cursor:pointer;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.renewed{
border-right:5px solid green;
}

.notRenewed{
border-right:5px solid red;
}

.hidden{
display:none;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin:15px 0;
}

.statCard{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.statCard span{
font-size:13px;
color:#555;
}

.statCard h2{
margin:5px 0;
color:#1e3c72;
}

</style>
</head>

<body>

<header>نظام إدارة الخطوط</header>

<div class="container">

<div id="loginBox">

<input id="email" placeholder="الإيميل">
<input id="password" type="password" placeholder="الباسورد">

<button id="loginBtn">تسجيل دخول</button>

</div>


<div id="dashboard" class="hidden">

<button id="logoutBtn">تسجيل خروج</button>

<div id="addSection" class="hidden">

<h3>إضافة رقم</h3>

<input id="phone" placeholder="الرقم">
<input id="family" placeholder="العائلة">
<input id="rep" placeholder="ايميل المندوب">
<input id="price" type="number" placeholder="السعر">

<button id="addBtn">إضافة</button>

</div>


<div class="stats">

<div class="statCard">
<span>إجمالي الأرقام</span>
<h2 id="statTotal">0</h2>
</div>

<div class="statCard">
<span>المتجدد</span>
<h2 id="statRenewed">0</h2>
</div>

<div class="statCard">
<span>غير المتجدد</span>
<h2 id="statNotRenewed">0</h2>
</div>

<div class="statCard" id="moneyBox">
<span>إجمالي المبيعات</span>
<h2 id="statMoney">0</h2>
</div>

</div>


<input id="searchInput" placeholder="بحث برقم">

<div id="numbersList"></div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, query, where }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAmstcSyoxzo15KbXda8L8tn-03LclRwkQ",
authDomain: "red-family.firebaseapp.com",
projectId: "red-family",
storageBucket: "red-family.firebasestorage.app",
messagingSenderId: "1087910827923",
appId: "1:1087910827923:web:6a681071ada3f5d921fa66"

};

const adminEmail="omaraadlemam5@gmail.com";

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);


loginBtn.onclick=async()=>{

const email=email.value;
const password=password.value;

try{

await signInWithEmailAndPassword(auth,email,password);

}catch(e){

alert(e.message);

}

};

logoutBtn.onclick=()=>signOut(auth);


onAuthStateChanged(auth,async(user)=>{

if(!user){

loginBox.classList.remove("hidden");
dashboard.classList.add("hidden");
return;

}

loginBox.classList.add("hidden");
dashboard.classList.remove("hidden");

if(user.email===adminEmail){

addSection.classList.remove("hidden");

}else{

addSection.classList.add("hidden");

}

loadNumbers(user);

});


addBtn.onclick=async()=>{

await addDoc(collection(db,"numbers"),{

phone:phone.value,
family:family.value,
rep:rep.value,
price:Number(price.value)||0,
renewed:false

});

location.reload();

};


async function loadNumbers(user){

let snapshot;

if(user.email===adminEmail){

snapshot=await getDocs(collection(db,"numbers"));

}else{

const q=query(collection(db,"numbers"),where("rep","==",user.email));

snapshot=await getDocs(q);

}

render(snapshot,user);

}


function render(snapshot,user){

numbersList.innerHTML="";

let total=0;
let renewed=0;
let notRenewed=0;
let money=0;

snapshot.forEach(d=>{

const n=d.data();

if(searchInput.value && !n.phone.includes(searchInput.value)) return;

total++;

if(n.renewed){

renewed++;

}else{

notRenewed++;

}

money+=n.price||0;

const card=document.createElement("div");

card.className="card "+(n.renewed?"renewed":"notRenewed");

if(user.email===adminEmail){

card.innerHTML=`
<strong>${n.phone}</strong><br>
العائلة: ${n.family}<br>
السعر: ${n.price}<br>
الحالة: ${n.renewed?"متجدد":"غير متجدد"}
<button onclick="toggle('${d.id}',${n.renewed})">
تغيير الحالة
</button>
`;

}else{

card.innerHTML=`
<strong>${n.phone}</strong><br>
الحالة: ${n.renewed?"متجدد":"غير متجدد"}
`;

}

numbersList.appendChild(card);

});

statTotal.innerText=total;
statRenewed.innerText=renewed;
statNotRenewed.innerText=notRenewed;
statMoney.innerText=money;

if(user.email!==adminEmail){

moneyBox.style.display="none";

}

}


window.toggle=async(id,state)=>{

await updateDoc(doc(db,"numbers",id),{

renewed:!state

});

location.reload();

};


searchInput.oninput=()=>location.reload();

</script>

</body>
</html>
